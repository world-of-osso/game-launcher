name: Build & Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            binary: game-launcher
            ext: ""
          - os: macos-latest
            platform: macos-aarch64
            binary: game-launcher
            ext: ""
          - os: windows-latest
            platform: windows-x86_64
            binary: game-launcher.exe
            ext: ".exe"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Build release
        run: cargo build --release

      - name: Prepare artifact
        shell: bash
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 -q | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
          ARTIFACT="game-launcher-${VERSION}-${{ matrix.platform }}${{ matrix.ext }}"
          cp "target/release/${{ matrix.binary }}" "$ARTIFACT"
          sha256sum "$ARTIFACT" | cut -d' ' -f1 > "${ARTIFACT}.sha256"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            game-launcher-*
            !*.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-sha256
          path: "*.sha256"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build launcher.json and deploy
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 -q | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")

          # Build multi-platform launcher.json
          python3 -c "
          import json, glob, os
          platforms = {}
          for sha_file in glob.glob('artifacts/*-sha256/*.sha256'):
              name = os.path.basename(sha_file).replace('.sha256', '')
              sha256 = open(sha_file).read().strip()
              # Extract platform from filename: game-launcher-VERSION-PLATFORM[.ext]
              parts = name.replace('.exe', '').split('-')
              platform = '-'.join(parts[2:])  # skip 'game' and 'launcher' prefix, version
              # Actually: game-launcher-0.1.0-linux-x86_64 -> skip first 3 segments
              seg = name.replace('.exe', '').split('-', 3)
              platform = seg[3] if len(seg) > 3 else platform
              platforms[platform] = {'file': name, 'sha256': sha256}
          print(json.dumps({'version': '$VERSION', 'platforms': platforms}, indent=2))
          " > launcher.json

          cat launcher.json

          # Set up SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "$DEPLOY_HOST" > /tmp/host
          HOST=$(cat /tmp/host)
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          REMOTE_DIR="/data/osso-website/downloads"
          SSH_OPTS="-i ~/.ssh/deploy_key"

          # Upload all binaries + launcher.json
          ssh $SSH_OPTS "$HOST" "mkdir -p ${REMOTE_DIR} && rm -f ${REMOTE_DIR}/game-launcher-*"
          for dir in artifacts/linux-x86_64 artifacts/macos-aarch64 artifacts/windows-x86_64; do
            [ -d "$dir" ] && scp $SSH_OPTS "$dir"/game-launcher-* "$HOST:${REMOTE_DIR}/"
          done
          scp $SSH_OPTS launcher.json "$HOST:${REMOTE_DIR}/"

          echo "Deployed v${VERSION}"
