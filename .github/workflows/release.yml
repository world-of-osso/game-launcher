name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            binary: game-launcher
            ext: ""
          - os: macos-latest
            platform: macos-aarch64
            binary: game-launcher
            ext: ""
          - os: windows-latest
            platform: windows-x86_64
            binary: game-launcher.exe
            ext: ".exe"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Build release
        run: cargo build --release --no-default-features --features desktop

      - name: Prepare artifact
        shell: bash
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 -q | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
          ARTIFACT="game-launcher-${VERSION}-${{ matrix.platform }}${{ matrix.ext }}"
          cp "target/release/${{ matrix.binary }}" "$ARTIFACT"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: game-launcher-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 -q | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
          TAG="${GITHUB_REF#refs/tags/}"

          # Collect all binaries
          FILES=()
          for dir in artifacts/*/; do
            for f in "$dir"game-launcher-*; do
              [ -f "$f" ] && FILES+=("$f")
            done
          done

          gh release create "$TAG" \
            --title "Game Launcher v${VERSION}" \
            --generate-notes \
            "${FILES[@]}"

          echo "Released v${VERSION} with ${#FILES[@]} assets"
